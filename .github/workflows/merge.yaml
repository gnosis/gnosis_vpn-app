name: Merge PR
on:
  pull_request:
    types:
      - closed
      # - synchronize
    branches:
      - main
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: merge
  cancel-in-progress: false
jobs:
  build-binaries:
    strategy:
      matrix:
        binary:
          - architecture: x86_64-linux
            runner: depot-ubuntu-22.04-4 # Depot Ubuntu 22.04, 4 CPUs, 16 GB RAM
          - architecture: aarch64-linux
            runner: depot-ubuntu-22.04-arm-4 # Depot Ubuntu 22.04 ARM, 4 CPUs, 16 GB RAM
          - architecture: aarch64-darwin
            runner: depot-macos-15 # Depot Apple Silicon M2, 8 CPUs, 24 GB RAM, 400 GB SSD (harden-runner skipped: Linux-only for third-party runners)
    name: Binary ${{ matrix.binary.architecture }}
    uses: ./.github/workflows/build-binaries.yaml
    with:
      source_branch: ${{ github.event.pull_request.base.ref }}
      architecture: ${{ matrix.binary.architecture }}
      runner: ${{ matrix.binary.runner }}
      version_type: "pr"
      enabled: ${{ github.event.pull_request.merged == true }}
    secrets: inherit
  snapshot-build:
    name: Snapshot build
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'snapshot-build')
    runs-on: depot-ubuntu-22.04-4
    needs:
      - build-binaries
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App token
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GH_APP_GNOSISVPN_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_GNOSISVPN_BOT_PRIVATE_KEY }}
          owner: gnosis
      - name: Trigger snapshot build
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.bot-token.outputs.token }}
          repository: gnosis/gnosis_vpn
          event-type: snapshot_build
