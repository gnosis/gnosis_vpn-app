name: Security Audit (Deno + pnpm)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deno-audit:
    name: Deno dependency audit (deno.lock)
    runs-on: depot-ubuntu-22.04-4
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "2.9.0"
          cache: true

      - name: Audit dependencies
        run: deno audit --lock=deno.lock --level=high

  pnpm-audit:
    name: Node dependency audit (pnpm)
    runs-on: depot-ubuntu-22.04-4
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check pnpm lockfile exists
        id: pnpm_lock
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.pnpm_lock.outputs.found == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9

      - name: Setup Node.js
        if: steps.pnpm_lock.outputs.found == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.pnpm_lock.outputs.found == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run security audit (prod deps only)
        if: steps.pnpm_lock.outputs.found == 'true'
        run: pnpm audit --audit-level=high --prod

      - name: Run security audit (dev deps, non-blocking)
        if: steps.pnpm_lock.outputs.found == 'true'
        continue-on-error: true
        run: pnpm audit --audit-level=high --dev
