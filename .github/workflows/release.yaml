name: Close release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        default: "patch"
        options:
          - rc
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-binaries:
    strategy:
      matrix:
        binary:
          - architecture: x86_64-linux
            runner: depot-ubuntu-22.04-4 # Depot Ubuntu 22.04, 4 CPUs, 16 GB RAM
          - architecture: aarch64-linux
            runner: depot-ubuntu-22.04-arm-4 # Depot Ubuntu 22.04 ARM, 4 CPUs, 16 GB RAM
          - architecture: aarch64-darwin
            runner: depot-macos-15 # Depot Apple Silicon M2, 8 CPUs, 24 GB RAM, 400 GB SSD (harden-runner skipped: Linux-only for third-party runners)
    name: Binary ${{ matrix.binary.architecture }}
    uses: ./.github/workflows/build-binaries.yaml
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    with:
      source_branch: ${{ github.ref_name }}
      architecture: ${{ matrix.binary.architecture }}
      runner: ${{ matrix.binary.runner }}
      version_type: "release"
    secrets: inherit

  release:
    name: Close release
    needs:
      - build-binaries
    runs-on: depot-ubuntu-22.04-4
    permissions:
      contents: write
    steps:
      - name: Release version
        uses: hoprnet/hopr-workflows/actions/release-version@9d3880d21d35d3ee6d3bc5cde6b62e91a84b56d8 # release-version-v5
        with:
          source_branch: ${{ github.ref_name }}
          file: src-tauri/Cargo.toml
          release_type: ${{ inputs.release_type }}
          cachix_cache_name: gnosis-vpn-app
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
          zulip_email: ${{ secrets.ZULIP_EMAIL }}
          zulip_channel: GnosisVPN
          zulip_topic: Releases
          gcp_service_account: ${{ secrets.GCP_SA_GITHUB_ACTIONS }}
          gcp_artifact_package: gnosis_vpn-app
          github_app_private_key: ${{ secrets.GH_APP_GNOSISVPN_BOT_PRIVATE_KEY }}
          github_app_client_id: ${{ secrets.GH_APP_GNOSISVPN_CLIENT_ID }}
      - name: Bump Package.json
        id: bump
        shell: bash
        run: |
          bump_version=$(grep -E '^version\s*=' src-tauri/Cargo.toml | awk -F\" '{print $2}')
          jq --arg v "$bump_version" '.version = $v' package.json > package-tmp.json && mv package-tmp.json package.json
          echo "bump_version=${bump_version}" | tee -a $GITHUB_OUTPUT
      - name: Generate GitHub App token
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GH_APP_GNOSISVPN_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_GNOSISVPN_BOT_PRIVATE_KEY }}
          owner: gnosis
      - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          add: '["package.json"]'
          new_branch: ${{ github.ref_name }}
          message: "Bump package.json to version ${{ steps.bump.outputs.bump_version }}"
          pathspec_error_handling: exitImmediately
          default_author: github_actions
          github_token: ${{ steps.bot-token.outputs.token }}
