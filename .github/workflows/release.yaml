name: Close release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version type after release
        required: true
        type: choice
        default: "patch"
        options:
          - rc
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-binaries:
    strategy:
      matrix:
        binary:
          - architecture: x86_64-linux
            runner: depot-ubuntu-22.04-4 # Depot Ubuntu 22.04, 4 CPUs, 16 GB RAM
          - architecture: aarch64-linux
            runner: depot-ubuntu-22.04-arm-4 # Depot Ubuntu 22.04 ARM, 4 CPUs, 16 GB RAM
          - architecture: aarch64-darwin
            runner: depot-macos-15 # Depot Apple Silicon M2, 8 CPUs, 24 GB RAM, 400 GB SSD
    name: Binary ${{ matrix.binary.architecture }}
    uses: ./.github/workflows/build-binaries.yaml
    with:
      source_branch: ${{ github.ref_name }}
      architecture: ${{ matrix.binary.architecture }}
      runner: ${{ matrix.binary.runner }}
      version_type: "release"
    secrets: inherit

  release:
    name: Close release
    needs:
      - build-binaries
    runs-on: depot-ubuntu-22.04-4
    permissions:
      contents: write
    steps:
      - name: Release version
        uses: hoprnet/hopr-workflows/actions/release-version@release-version-v3
        with:
          source_branch: ${{ github.ref_name }}
          file: src-tauri/Cargo.toml
          release_type: ${{ inputs.release_type }}
          package_name: gnosis_vpn-app
          cachix_cache_name: gnosis-vpn-app
          cachix_auth_token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          zulip_api_key: ${{ secrets.ZULIP_API_KEY }}
          zulip_email: ${{ secrets.ZULIP_EMAIL }}
          zulip_channel: GnosisVPN
          zulip_topic: Releases
          gcp_service_account: ${{ secrets.GCP_SA_GITHUB_ACTIONS }}
          gcp_project: gnosisvpn-production
          github_token: ${{ secrets.BOT_TOKEN }}
      - name: Bump Package.json
        id: bump
        shell: bash
        run: |
          bump_version=$(grep -E '^version\s*=' src-tauri/Cargo.toml | awk -F\" '{print $2}')
          jq --arg v "$bump_version" '.version = $v' package.json > package-tmp.json && mv package-tmp.json package.json
          echo "bump_version=${bump_version}" | tee -a $GITHUB_OUTPUT
      - uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9
        with:
          add: '["package.json"]'
          new_branch: main
          message: "Bump package.json to version ${{ steps.bump.outputs.bump_version }}"
          pathspec_error_handling: exitImmediately
          default_author: github_actions
          github_token: ${{ secrets.BOT_TOKEN }}
