name: Close release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Next version type"
        required: true
        type: choice
        default: "patch"
        options:
          - patch
          - minor
          - major
      trigger_snapshot:
        description: "Trigger installer snapshot in gnosis_vpn"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-binaries:
    strategy:
      matrix:
        binary:
          - architecture: x86_64-linux
            runner: depot-ubuntu-22.04-4 # Depot Ubuntu 22.04, 4 CPUs, 16 GB RAM
          - architecture: aarch64-linux
            runner: depot-ubuntu-22.04-arm-4 # Depot Ubuntu 22.04 ARM, 4 CPUs, 16 GB RAM
          - architecture: aarch64-darwin
            runner: depot-macos-15 # Depot Apple Silicon M2, 8 CPUs, 24 GB RAM, 400 GB SSD
    name: Binary ${{ matrix.binary.architecture }}
    uses: ./.github/workflows/build-binaries.yaml
    with:
      branch: main
      architecture: ${{ matrix.binary.architecture }}
      runner: ${{ matrix.binary.runner }}
      version_type: "release"
    secrets: inherit

  container-scan:
    name: On-Demand Container Vulnerability Scan
    runs-on: depot-ubuntu-22.04-4
    permissions:
      contents: read
    env:
      GCP_PROJECT: gnosisvpn-production
      GCP_REGION: europe-west3
      SCAN_REPO: docker-scan
      IMAGE_NAME: release-base
    steps:
      - name: Setup GCP
        uses: hoprnet/hopr-workflows/actions/setup-gcp@setup-gcp-v1
        with:
          google_credentials: ${{ secrets.GCP_SA_GITHUB_ACTIONS }}
          install_sdk: "true"

      - name: Configure Docker authentication for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Ensure scan repository exists
        run: |
          gcloud artifacts repositories describe "${{ env.SCAN_REPO }}" \
            --location="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --quiet 2>/dev/null || \
          gcloud artifacts repositories create "${{ env.SCAN_REPO }}" \
            --repository-format=docker \
            --location="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --description="Temporary repository for on-demand container scanning"

      - name: Build and push image representing the deployment environment
        id: push-image
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.SCAN_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          # Build an image matching the runtime environment where .deb packages are installed
          docker build --no-cache -t "${IMAGE_URI}" - <<'EOF'
          FROM ubuntu:22.04
          RUN apt-get update && apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-0 \
            libappindicator3-1 \
            librsvg2-2 \
            && rm -rf /var/lib/apt/lists/*
          EOF
          docker push "${IMAGE_URI}"

      - name: Run on-demand vulnerability scan
        id: scan
        run: |
          SCAN_OUTPUT=$(gcloud artifacts docker images scan \
            "${{ steps.push-image.outputs.image_uri }}" \
            --location="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --format=json)
          echo "$SCAN_OUTPUT" > scan-results.json
          SCAN_RESOURCE=$(echo "$SCAN_OUTPUT" | jq -r '.response.results.name')
          echo "scan_resource=${SCAN_RESOURCE}" >> "$GITHUB_OUTPUT"
          CRITICAL=$(echo "$SCAN_OUTPUT" | jq -r '.response.results.summary.severityCounts.CRITICAL // 0')
          HIGH=$(echo "$SCAN_OUTPUT" | jq -r '.response.results.summary.severityCounts.HIGH // 0')
          echo "critical_count=${CRITICAL}" >> "$GITHUB_OUTPUT"
          echo "high_count=${HIGH}" >> "$GITHUB_OUTPUT"

      - name: Display blocking vulnerabilities
        if: >-
          steps.scan.outputs.critical_count != '0' ||
          steps.scan.outputs.high_count != '0'
        run: |
          gcloud artifacts docker images list-vulnerabilities \
            "${{ steps.scan.outputs.scan_resource }}" \
            --format=json \
            --project="${{ env.GCP_PROJECT }}" | \
          jq '[.[] | select(
            .vulnerability.effectiveSeverity == "CRITICAL" or
            .vulnerability.effectiveSeverity == "HIGH"
          ) | {
            severity:     .vulnerability.effectiveSeverity,
            cve:          .vulnerability.shortDescription,
            package:      .vulnerability.packageIssue[0].affectedPackage,
            version:      .vulnerability.packageIssue[0].affectedVersion.name,
            fixedVersion: .vulnerability.packageIssue[0].fixedVersion.name
          }]'

      - name: Block release on Critical or High findings
        run: |
          CRITICAL="${{ steps.scan.outputs.critical_count }}"
          HIGH="${{ steps.scan.outputs.high_count }}"
          echo "Critical: ${CRITICAL}  |  High: ${HIGH}"
          if [ "${CRITICAL}" -gt 0 ] || [ "${HIGH}" -gt 0 ]; then
            echo "Release blocked: ${CRITICAL} Critical and ${HIGH} High vulnerabilities detected in the deployment image."
            exit 1
          fi
          echo "Scan passed — no Critical or High vulnerabilities found."

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: container-scan-report-${{ github.sha }}
          path: scan-results.json
          retention-days: 30

      - name: Cleanup scanned image from Artifact Registry
        if: always()
        run: |
          gcloud artifacts docker images delete \
            "${{ steps.push-image.outputs.image_uri }}" \
            --quiet \
            --project="${{ env.GCP_PROJECT }}" || true

  release:
    name: Close release
    needs:
      - build-binaries
      - container-scan
    runs-on: depot-ubuntu-22.04-4
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.BOT_TOKEN }}
      - name: Setup GCP
        id: gcp
        uses: hoprnet/hopr-workflows/actions/setup-gcp@setup-gcp-v1
        with:
          google_credentials: ${{ secrets.GCP_SA_GITHUB_ACTIONS }}
          install_sdk: "true"
      - name: Install Nix
        uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31
      - name: Setup environment variables
        id: environment
        run: |
          release_version=$(grep -E '^version\s*=' src-tauri/Cargo.toml | awk -F\" '{print $2}')
          echo "release_version=${release_version}" | tee -a $GITHUB_OUTPUT
      - name: Download macOS binaries from Artifact Registry
        uses: hoprnet/hopr-workflows/actions/download-artifact-registry@download-artifact-registry-v1
        with:
          destination: ./binaries
          project: gnosisvpn-production
          region: europe-west3
          repository: rust-binaries
          package: gnosis_vpn-app
          version: ${{ steps.environment.outputs.release_version }}
      - name: Create GitHub release
        run: |
          TAG="v${{ steps.environment.outputs.release_version }}"
          echo "Checking if release ${TAG} already exists"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists, deleting it"
            gh release delete "${TAG}" --yes --cleanup-tag
          fi
          echo "Generating release notes"
          gh release create "${TAG}" --generate-notes
          echo "Uploading binaries to release ${TAG}"
          for file in binaries/*; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload "${TAG}" "$file" --clobber
            fi
          done
          echo "Release ${TAG} created and binaries uploaded"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Bump Version
        id: bump
        shell: bash
        run: |
          current_version=$(grep -E '^version\s*=' src-tauri/Cargo.toml | awk -F\" '{print $2}')
          echo "current_version=$current_version" | tee -a $GITHUB_OUTPUT
          # Extract parts without IFS or read
          IFS='.' read -r major_version minor_version patch_version <<< "${current_version}"
          echo "Current version $major_version $minor_version $patch_version"

          # Bump the appropriate part
          echo "Bumping ${{ inputs.release_type }} version"
          case "${{ inputs.release_type }}" in
              major)
                  major_version=$((major_version+1))
                  minor_version=0
                  patch_version=0
                  ;;
              minor)
                  minor_version=$((minor_version+1))
                  patch_version=0
                  ;;
              patch)
                  patch_version=$((patch_version+1))
                  ;;
              *)
                  echo "Invalid release type"
                  exit 1
                  ;;
          esac
          echo "New version: ${major_version}.${minor_version}.${patch_version}"

          bump_version="${major_version}.${minor_version}.${patch_version}"
          echo "Updating version from $current_version to $bump_version"

          # Update the version in src-tauri/Cargo.toml
          # capture group 1: version = "
          # capture group 2: the version number
          # capture group 3: "
          sed -i.bak -E "s/(^version = \")([0-9]+\.[0-9]+\.[0-9]+)(\")/\1${bump_version}\3/" src-tauri/Cargo.toml
          rm src-tauri/Cargo.toml.bak
          nix develop --command cargo metadata --format-version 1 --manifest-path src-tauri/Cargo.toml > /dev/null
          jq --arg v "$bump_version" '.version = $v' package.json > package-tmp.json && mv package-tmp.json package.json
          echo "bump_version=${bump_version}" | tee -a $GITHUB_OUTPUT
      - uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9
        with:
          add: '["src-tauri/Cargo.*", "package.json"]'
          new_branch: main
          message: "Bump to version ${{ steps.bump.outputs.bump_version }}"
          pathspec_error_handling: exitImmediately
          default_author: github_actions
          github_token: ${{ secrets.BOT_TOKEN }}
      - name: Notify release
        uses: zulip/github-actions-zulip/send-message@e4c8f27c732ba9bd98ac6be0583096dea82feea5 # v1.0.2
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: ${{ secrets.ZULIP_EMAIL }}
          organization-url: "https://hopr.zulipchat.com"
          type: "stream"
          to: "GnosisVPN"
          topic: "Releases"
          content: |
            I'm thrilled to inform the new `gnosis_vpn-app` version `v${{ steps.bump.outputs.current_version }}` has been released.
            [Release Notes](${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.bump.outputs.current_version }})
      - name: Trigger installer snapshot
        if: ${{ inputs.trigger_snapshot }}
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3.0.0
        with:
          token: ${{ secrets.GNOSIS_GITHUB_WORKFLOW_TOKEN }}
          repository: gnosis/gnosis_vpn
          event-type: new_snapshot_release
          client-payload: |-
            {
              "draft_release": "false",
              "client_version": "latest",
              "app_version": "${{ steps.bump.outputs.current_version }}"
            }
